version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: biokey-postgres
    environment:
      POSTGRES_DB: biokey_db
      POSTGRES_USER: biokey
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_me_in_production}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./database/seeds.sql:/docker-entrypoint-initdb.d/02-seeds.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U biokey"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - biokey-network

  backend:
    build:
      context: ./backend-server
      dockerfile: Dockerfile
    container_name: biokey-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_NAME: biokey_db
      DB_USER: biokey
      DB_PASSWORD: ${DB_PASSWORD:-change_me_in_production}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_POOL_SIZE: 10
      
      API_PORT: 4567
      API_BIND: 0.0.0.0
      APP_ENV: ${APP_ENV:-production}
      APP_SESSION_SECRET: ${APP_SESSION_SECRET:-change_me_min_32_chars}
      
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: json
    ports:
      - "4567:4567"
    volumes:
      - ./backend-server:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4567/login"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - biokey-network
    restart: unless-stopped

  # Optional: pgAdmin for database management
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: biokey-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@biokey.local
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - biokey-network
    profiles: ["dev"]  # Only run with: docker-compose --profile dev up

volumes:
  postgres_data:
    driver: local

networks:
  biokey-network:
    driver: bridge
